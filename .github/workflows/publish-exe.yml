name: Build and commit Windows exe

on:
  push:
    branches: [ master ]
    # Ignore commits that only change exe files in repo root to avoid recursion
    paths-ignore:
      - '*.exe'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore multimedialni_panel/multimedialni_panel.csproj

      - name: Publish single-file exe
        run: |
          dotnet publish multimedialni_panel/multimedialni_panel.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o publish

        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path publish -Filter *.exe | Select-Object -First 1

